services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    depends_on:
      - dotnet_api
      - grafana
    networks:
      - app_network
    restart: always

  dotnet_api:
    build:
      context: ./AMonitor.API
      dockerfile: Dockerfile
    container_name: dotnet_api
    depends_on:
      - timescaledb
    networks:
      - app_network
    restart: always
    command: sh -c "sleep 5 && dotnet AMonitor.API.dll"

  timescaledb:
    image: timescale/timescaledb-ha:pg17
    container_name: timescaledb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=alerts_db
    networks:
      - app_network
    restart: always

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana_dashboard
    networks:
      - app_network
    restart: always

networks:
  app_network:
    driver: bridge
