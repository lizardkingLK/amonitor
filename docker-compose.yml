services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dotnet_api
      - grafana
    networks:
      - app_network
    restart: always

  dotnet_api:
    build:
      context: ./AMonitor.API
      dockerfile: Dockerfile
    container_name: dotnet_api
    command: sh -c "sleep 5 && dotnet AMonitor.API.dll"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:80
      - Database__ConnectionString=Host=timescaledb;Database=alerts_db;Username=postgres;Password=secret
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - timescaledb
    networks:
      - app_network
    restart: always

  timescaledb:
    image: timescale/timescaledb-ha:pg17
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=alerts_db
    volumes:
      - timescaledb_data:/home/postgres/pgdata/data
    networks:
      - app_network
    restart: always

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana_dashboard
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=secret
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app_network
    restart: always

networks:
  app_network:
    driver: bridge

volumes:
  timescaledb_data:
  grafana_data:
