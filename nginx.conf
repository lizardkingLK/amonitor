events { worker_connections 1024; }

http {
    # CRITICAL: This is Docker's internal DNS server. Nginx needs this to find containers dynamically.
    resolver 127.0.0.11 valid=5s;

    server {
        listen 80;

        # Route API requests to the .NET container
        location /api/azure-alerts {
            # Move the container address into a variable
            set $backend http://dotnet_api:80;
            
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route Dashboard requests to the Grafana container
        location / {
            set $dashboard http://grafana:3000;
            proxy_pass $dashboard;
            
            # Explicitly forward the original host headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSockets support for Grafana assets
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
